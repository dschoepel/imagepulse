# ─────────────────────────────────────────────────────────────────
# ImagePulse — docker-compose.yml
# Copy .env.example to .env and set your values before starting.
#
# Portainer / Rancher users: define all variables in the stack's
# "Environment variables" UI instead of using a .env file — the
# env_file block at the bottom is for CLI use only.
# ─────────────────────────────────────────────────────────────────

services:
  imagepulse:

    # ── Image ─────────────────────────────────────────────────────
    # Pre-built image from GitHub Container Registry (recommended).
    # Replace 'latest' with a specific version tag to pin the release,
    # e.g. ghcr.io/dschoepel/imagepulse:1.0.0
    image: ghcr.io/dschoepel/imagepulse:latest
    # To build locally from source instead, comment out 'image' above
    # and uncomment the line below:
    # build: .

    container_name: imagepulse

    # ── User / permissions ────────────────────────────────────────
    # Run as your host user so files written to ./data are owned by
    # you, not root. Set PUID and PGID in .env (run `id` to find them).
    user: "${PUID:-1000}:${PGID:-1000}"

    # ── Port ──────────────────────────────────────────────────────
    # Format: "HOST_PORT:CONTAINER_PORT"
    # Both sides must match PORT in .env (default 3579).
    # If this container is accessed exclusively through a reverse proxy
    # on a shared Docker network (see the network section below), you
    # can remove or comment out this entire 'ports' block — the proxy
    # will reach ImagePulse via the internal network without a host
    # port being exposed.
    ports:
      - "${PORT:-3579}:${PORT:-3579}"

    volumes:
      # Persists the SQLite database between container restarts.
      # Change the host path (left side) if needed; leave the
      # container path (/app/data) as-is.
      - ./data:/app/data

    environment:
      # ── Server ──────────────────────────────────────────────────
      - NODE_ENV=production
      - PORT=${PORT:-3579}
      - TZ=${TZ:-UTC}
      - DB_PATH=${DB_PATH:-/app/data/imagepulse.db}

      # ── ntfy ────────────────────────────────────────────────────
      - NTFY_ENABLED=${NTFY_ENABLED:-false}
      - NTFY_URL=${NTFY_URL:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-imagepulse}
      - NTFY_TOKEN=${NTFY_TOKEN:-}
      # Must be a publicly reachable PNG/JPG/ICO URL for the notification icon.
      # Falls back to APP_BASE_URL/favicon.ico, then to a GitHub-hosted SVG.
      - NTFY_ICON_URL=${NTFY_ICON_URL:-}

      # ── Email (SMTP) ─────────────────────────────────────────────
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_TO=${EMAIL_TO:-}

      # ── GitHub ──────────────────────────────────────────────────
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

      # ── Event retention ─────────────────────────────────────────
      - RETENTION_DAYS=${RETENTION_DAYS:-90}

      # ── Webhook security ────────────────────────────────────────
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}

      # ── Public base URL ─────────────────────────────────────────
      # Used for the ntfy icon if NTFY_ICON_URL is not set.
      # Set when DIUN calls ImagePulse directly on an internal network.
      - APP_BASE_URL=${APP_BASE_URL:-}

      # ── Logging ─────────────────────────────────────────────────
      # Verbosity: trace | debug | info | warn | error | fatal
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Append logs to a file in addition to stdout. Use an absolute
      # path inside the mounted data directory, e.g. /app/data/imagepulse.log
      - LOG_FILE=${LOG_FILE:-}

    env_file:
      # Loads settings from a local .env file — for CLI / docker compose use.
      # Portainer / Rancher users: comment this block out and define all
      # variables in the stack's "Environment variables" UI instead.
      - .env

    restart: unless-stopped

    # ── Optional: reverse-proxy network ──────────────────────────
    # If you use a reverse proxy (SWAG, Traefik, Nginx Proxy Manager,
    # etc.) on a dedicated Docker network, uncomment the 'networks'
    # blocks below and set PROXY_NETWORK in .env if your network is
    # named something other than proxy_net.
    # The proxy will reach ImagePulse by container name + port on the
    # internal network, so you can also remove the 'ports' block above.
    #
    # networks:
    #   - proxy_net

# networks:
#   proxy_net:
#     external: true
#     name: ${PROXY_NETWORK:-proxy_net}
